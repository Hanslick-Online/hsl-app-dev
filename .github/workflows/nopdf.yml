name: Build without PDF
on:
  workflow_dispatch:
    inputs:
      devBranch:
        description: 'Development branch'
        required: true
        default: 'dev'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_pages:
    name:  Build HTML pages
    runs-on: ubuntu-latest
    env:
      ANT_OPTS: -Xmx5g
    steps:
    - name: Perform Checkout
      uses: actions/checkout@v7
    - name: Fetch static-app skeleton
      run: |
        ./fetch_data_app.sh  ${{ inputs.devBranch }}

    - name: set up uv (Python)
      uses: astral-sh/setup-uv@v8.1.0

    - name: Install Python dependencies
      run: |
        uv sync
        echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

    - name: Fetch data
      run: |
        chmod +x build_app/shell/* build_app/python/*
        ./build_app/shell/fetch_data.sh
    - name: Fix wrong pagination in 8th edition
      run: ./build_app/python/fix_facs_1891.py
    - name: Get imprint
      run: ./build_app/python/dl_imprint.py

    - name: preprocess
      run: |
        ant -f build_app/ant/preprocess.xml
    - name: add attributes and denormalize indices
      run: |
        ./build_app/shell/attributes.sh
        ./build_app/shell/denormalize.sh

    - name: Fix TEI
      run: |
        ant -f build_app/ant/fixtures.xml

    - name: Build
      run: |
        ant -f build_app/ant/build.xml
    - name: Setup Pages
      uses: actions/configure-pages@v5
    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: data-artifact
        # Upload entire repository
        path: .
    - name: Upload full site artifacts
      id: deployment
      uses: actions/upload-pages-artifact@v5
      with:
        path: "html"
  type_sense:
    name: Reindex TypeSense
    runs-on: ubuntu-latest
    needs: build_pages
    env:
      TYPESENSE_HOST: typesense.acdh-dev.oeaw.ac.at
      TYPESENSE_PORT: 443
      TYPESENSE_PROTOCOL: https
      TYPESENSE_API_KEY: ${{secrets.TYPESENSE_API_KEY}}
    steps:
    - name: Perform Checkout
      uses: actions/checkout@v5
    - name: Download html-artifact
      uses: actions/download-artifact@v8
      with:
        name: data-artifact
        path: .
  # - name: Preprocess data for Typesense
  #   run: |
  #     ant -f build_app/ant/fixtures.xml
  # - name: Build Typesense Index
  #  run: |
  #    python build_app/python/make_ts_index.py
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build_pages
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
